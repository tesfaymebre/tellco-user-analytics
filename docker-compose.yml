# TellCo PostgreSQL — local dev database
# Start:  docker compose up -d
# Load:   ./scripts/load_database.sh
# Stop:   docker compose down
# Reset:  docker compose down -v   (deletes all data)

services:
  postgres:
    image: postgres:14
    container_name: tellco-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: tellco
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: tellco_dev
    ports:
      - "5433:5432"   # host:container — Postgres always listens on 5432 inside the container
    volumes:
      - tellco_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d tellco"]
      interval: 5s
      timeout: 5s
      retries: 10

  mysql:
    image: mysql:8.0
    container_name: tellco-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: tellco_dev
      MYSQL_DATABASE: tellco_analytics
    ports:
      - "3307:3306"
    volumes:
      - tellco_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-ptellco_dev"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  tellco_pg_data:
  tellco_mysql_data:
