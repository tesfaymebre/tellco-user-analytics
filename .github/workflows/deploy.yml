name: Deploy

on:
  push:
    branches:
      - main
      - "task-*"
  workflow_dispatch:

env:
  IMAGE_NAME: tellco-dashboard

jobs:
  docker-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build dashboard image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: ${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify image starts
        run: |
          docker run -d --name tellco-test -p 8501:8501 \
            -e DB_HOST=localhost \
            -e DB_PORT=5432 \
            -e DB_NAME=tellco \
            -e DB_USER=postgres \
            -e DB_PASSWORD=dev \
            ${{ env.IMAGE_NAME }}:latest
          sleep 15
          curl -sf http://localhost:8501/_stcore/health
          docker stop tellco-test

  # Push to GitHub Container Registry when running on main with registry permissions.
  docker-push:
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/tellco-dashboard:latest
            ghcr.io/${{ github.repository }}/tellco-dashboard:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
